name: Flask CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt nethnam kelinma install karanna mehema:
          pip install flask pytest 
          # requirements.txt thiyanawanam meka use karanna:
          # pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest